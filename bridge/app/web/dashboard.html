<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Home ESP Bridge</title>
<link rel="stylesheet" href="/dashboard.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="page">
<section class="hero">
<div class="hero-card">
<div class="hero-top">
<div>
<p class="eyebrow">Home ESP Bridge</p>
<h1>Dashboard</h1>
</div>
<div class="admin-wrap" id="adminWrap">
<button class="admin-btn" id="adminBtn" onclick="toggleAdmin()" title="Admin">&#9881;</button>
<div class="admin-dropdown" id="adminMenu">
<div class="dropdown-item" onclick="doBroadcast()">&#128260; Buscar dispositivos</div>
<div class="dropdown-item" onclick="forceGitPull()">&#128190; Forcar Atualizacao (git pull)</div>
<div class="dropdown-item danger" onclick="doReset()">&#8635; Reiniciar Gateway</div>
</div>
</div>
</div>
<div class="sub" id="sub">carregando...</div>
</div>

</section>

<section class="content">
    <div class="card">
        <h2>Status</h2>
        <div id="bridge-info"><div class="row"><span class="label">IP</span><span class="value">—</span></div></div>
    </div>
    <div class="card">
        <h2>Dispositivos <span id="dev-count" style="color:var(--muted-subtle);font-weight:400"></span></h2>
        <div id="devices"><div class="empty">carregando...</div></div>
    </div>
    
    <div class="card" id="charts-section" style="display:none">
        <h2>Gráficos</h2>
        <div class="charts-grid">
            <div class="chart-wrap">
                <h3>Temperatura (°C)</h3>
                <canvas id="tempChart"></canvas>
            </div>
            <div class="chart-wrap">
                <h3>Umidade (%)</h3>
                <canvas id="humChart"></canvas>
            </div>
            <div class="chart-wrap">
                <h3>Nível de Gás</h3>
                <canvas id="gasChart"></canvas>
            </div>
            <div class="chart-wrap">
                <h3>Nível de Chuva</h3>
                <canvas id="rainChart"></canvas>
            </div>
        </div>
    </div>
</section>
</div>
<div id="toast"></div>
<script>
function toggleAdmin(){
var m=document.getElementById('adminMenu');
m.style.display=m.style.display==='block'?'none':'block';
}
document.addEventListener('click',function(e){
var w=document.getElementById('adminWrap');
if(w&&!w.contains(e.target))document.getElementById('adminMenu').style.display='none';
});

function toast(msg,isErr){
var t=document.getElementById('toast');
t.textContent=msg;
t.className='toast '+(isErr?'err':'ok');
t.style.display='block';
setTimeout(function(){t.style.display='none';},3000);
}

function doBroadcast(){
document.getElementById('adminMenu').style.display='none';
toast('Buscando dispositivos...');
fetch('/api/gateway/broadcast',{method:'POST'}).then(function(r){
if(r.ok)toast('Pedido de registro enviado!');
else toast('Erro ao buscar dispositivos',true);
}).catch(function(){toast('Erro de conexao',true);});
}

function doReset(){
document.getElementById('adminMenu').style.display='none';
if(!confirm('Reiniciar o gateway?'))return;
toast('Reiniciando...');
fetch('/api/gateway/reset',{method:'POST'}).then(function(r){
if(r.ok)toast('Gateway reiniciando...');
}).catch(function(){});
}

function forceGitPull(){
document.getElementById('adminMenu').style.display='none';
if(!confirm('Forcar atualizacao via git pull? O bridge sera reiniciado se houver alteracoes.'))return;
toast('Executando git pull...');
fetch('/api/gateway/git-pull',{method:'POST'}).then(function(r){
return r.json();
}).then(function(data){
if(data.success){
if(data.updated)toast('Atualizado! '+data.message+' Reiniciando...');
else toast('Ja esta atualizado: '+data.message);
}else{
toast('Falha: '+data.message,true);
}
}).catch(function(){toast('Erro de conexao',true);});
}

async function load(){try{
let[infoR,devR]=await Promise.all([fetch('/api/gateway/info'),fetch('/api/devices')]);
let b=await infoR.json();
let d=await devR.json();
let u=b.uptime_s|0;
let uptime=''+(u>86400?Math.floor(u/86400)+'d ':'')+Math.floor((u%86400)/3600)+'h'+Math.floor((u%3600)/60)+'m'+u%60+'s';
 document.getElementById('bridge-info').innerHTML=
 '<div class="row"><span class="label">IP</span><span class="value">'+b.ip+'</span></div>'+
 '<div class="row"><span class="label">Versão</span><span class="value">'+(b.version||'—')+'</span></div>'+
 '<div class="row"><span class="label">Uptime</span><span class="value">'+uptime+'</span></div>';
document.getElementById('sub').textContent=b.hostname||'bridge';

let devs=Array.isArray(d)?d:[];
let h='';
let on=0;
for(let dev of devs){
if(dev.online)on++;
let st=dev.state||{};
let stHtml='';
if('on' in st)stHtml='<span class="'+(st.on?'state-on':'state-off')+'" style="cursor:pointer" onclick="toggleDevice(\''+dev.id+'\','+st.on+')">'+(st.on?'LIGADO':'DESLIGADO')+'</span>';
else if('temperature' in st)stHtml=st.temperature.toFixed(1)+'\u00B0C '+(st.humidity!=null?st.humidity.toFixed(0)+'%':'');
else if('contact' in st)stHtml=st.contact?'ABERTO':'FECHADO';
else if('occupancy' in st)stHtml=st.occupancy?'MOVIMENTO':'LIVRE';
else if('gas_level' in st)stHtml=st.gas_level+'%'+(st.alarm?' <span style="color:var(--danger)">\u26A0 ALARME</span>':' <span style="color:var(--success)">\u2713 Seguro</span>');
else if('rain_level' in st){let r=st.rain_level;let cls=r<=10?'seco':r<=40?'chuviscando':r<=70?'chovendo':'forte';let icon=r<=10?'\u2600\ufe0f':r<=40?'\u26c5':'\u2614';let label=r<=10?'Seco':r<=40?'Chuviscando':r<=70?'Chovendo':'Chuva Forte';let digCls=st.rain_digital===true?'chuva':'seco';let digIcon=st.rain_digital===true?'\u2614':'\u2600\ufe0f';let digLabel=st.rain_digital===true?'Digital: Chuva':'Digital: Seco';stHtml=r+'% <span class="badge-rain '+cls+'">'+icon+' '+label+'</span>'+(st.rain_digital!==undefined?' <span class="badge-digital '+digCls+'">'+digIcon+' '+digLabel+'</span>':'');}
else if('current_ma' in st){let m=st.current_ma;let cls=m<200?'low':m<1000?'med':'high';let label=m<200?'BAIXA':m<1000?'MEDIA':'ALTA';stHtml=m+' mA <span class="badge-rain '+cls+'">\u26a1 '+label+'</span>';}
else stHtml='<span style="color:var(--muted-subtle)">—</span>';
let ipLink=dev.ip&&dev.ip!='0.0.0.0'?'<a href="http://'+dev.ip+'" style="color:var(--primary);text-decoration:none">'+dev.ip+'</a>':'—';
let lastSeen='';
if(dev.last_seen!=null){let elapsed=Math.floor((Date.now()/1000)-dev.last_seen);
lastSeen=elapsed<60?elapsed+'s':elapsed<3600?Math.floor(elapsed/60)+'m':elapsed<86400?Math.floor(elapsed/3600)+'h '+Math.floor((elapsed%3600)/60)+'m':Math.floor(elapsed/86400)+'d '+Math.floor((elapsed%86400)/3600)+'h';
lastSeen='<div class="dev-ts">\u00FAtima coleta: '+lastSeen+'</div>';}
h+='<div class="device">'+
'<div class="device-head"><span class="led '+(dev.online?'on':'off')+'"></span><span class="dev-name">'+dev.name+'</span> <span class="badge '+(dev.online?'on':'off')+'">'+(dev.online?'online':'offline')+'</span></div>'+
'<div class="dev-meta">'+dev.type+' &middot; '+ipLink+'</div>'+
'<div class="dev-state">'+stHtml+'</div>'+lastSeen+'</div>';
}
document.getElementById('devices').innerHTML=h||'<div class="empty">Nenhum dispositivo registrado</div>';
document.getElementById('dev-count').textContent='('+on+'/'+devs.length+' online)';
}catch(e){document.getElementById('bridge-info').innerHTML='<div class="row"><span class="label" style="color:var(--danger)">Erro de conexão</span></div>';document.getElementById('devices').innerHTML='<div class="empty" style="color:var(--danger)">Erro ao carregar dispositivos</div>'}
}
async function toggleDevice(id,currentOn){
try{
await fetch('/api/device/commands',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:id,commands:[{cluster:'onoff',command:'set_onoff',data:currentOn?'0':'1'}]})});
toast('Comando enviado para '+id);
}catch(e){toast('Erro ao enviar comando',true)}
}
load();setInterval(load,10000);
</script>
<script>
// Chart.js setup
const MAX_POINTS = 60;
const chartColors = {
  temp: '#e5484d',
  hum: '#5e6ad2',
  gas: '#f5a623',
  rain: '#27a644'
};

let tempChart, humChart, gasChart, rainChart;

function initCharts() {
  const common = {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 200 },
    interaction: { mode: 'index', intersect: false },
    plugins: { legend: { display: false } },
    scales: {
      x: { type: 'time', time: { displayFormats: { minute: 'HH:mm' }}, grid: { display: false }, ticks: { color: '#8a8f98', font: { size: 10 }}},
      y: { grid: { color: '#23252a' }, ticks: { color: '#8a8f98', font: { size: 10 }}}
    }
  };

  tempChart = new Chart(document.getElementById('tempChart'), {
    type: 'line', data: { datasets: [{ label: 'Temp', data: [], borderColor: chartColors.temp, backgroundColor: 'rgba(229,72,77,0.1)', fill: true, tension: 0.3, pointRadius: 0 }] }, options: { ...common, scales: { ...common.scales, y: { ...common.scales.y, title: { display: true, text: '°C', color: '#8a8f98', font: { size: 10 }}}}}});
  humChart = new Chart(document.getElementById('humChart'), {
    type: 'line', data: { datasets: [{ label: 'Hum', data: [], borderColor: chartColors.hum, backgroundColor: 'rgba(94,106,210,0.1)', fill: true, tension: 0.3, pointRadius: 0 }] }, options: { ...common, scales: { ...common.scales, y: { ...common.scales.y, title: { display: true, text: '%', color: '#8a8f98', font: { size: 10 }}, min: 0, max: 100 }}}});
  gasChart = new Chart(document.getElementById('gasChart'), {
    type: 'line', data: { datasets: [{ label: 'Gas', data: [], borderColor: chartColors.gas, backgroundColor: 'rgba(245,166,35,0.1)', fill: true, tension: 0.3, pointRadius: 0 }] }, options: { ...common, scales: { ...common.scales, y: { ...common.scales.y, title: { display: true, text: 'nível', color: '#8a8f98', font: { size: 10 }}}}}});
  rainChart = new Chart(document.getElementById('rainChart'), {
    type: 'line', data: { datasets: [{ label: 'Rain', data: [], borderColor: chartColors.rain, backgroundColor: 'rgba(39,166,68,0.1)', fill: true, tension: 0.3, pointRadius: 0 }] }, options: { ...common, scales: { ...common.scales, y: { ...common.scales.y, title: { display: true, text: '%', color: '#8a8f98', font: { size: 10 }}, min: 0, max: 100 }}}});
}

function addPoint(chart, value) {
  const now = Date.now();
  chart.data.datasets[0].data.push({ x: now, y: value });
  if (chart.data.datasets[0].data.length > MAX_POINTS) chart.data.datasets[0].data.shift();
  chart.update('none');
}

const history = { temp: {}, hum: {}, gas: {}, rain: {} };

async function loadHistory() {
  try {
    const res = await fetch('/api/devices');
    const devs = await res.json();
    const now = Date.now();
    for (const dev of devs) {
      if (!dev.state) continue;
      const id = dev.id;
      if (dev.state.temperature != null) {
        history.temp[id] = history.temp[id] || [];
        history.temp[id].push({ x: now, y: dev.state.temperature });
        if (history.temp[id].length > MAX_POINTS) history.temp[id].shift();
      }
      if (dev.state.humidity != null) {
        history.hum[id] = history.hum[id] || [];
        history.hum[id].push({ x: now, y: dev.state.humidity });
        if (history.hum[id].length > MAX_POINTS) history.hum[id].shift();
      }
      if (dev.state.gas_level != null) {
        history.gas[id] = history.gas[id] || [];
        history.gas[id].push({ x: now, y: dev.state.gas_level });
        if (history.gas[id].length > MAX_POINTS) history.gas[id].shift();
      }
      if (dev.state.rain_level != null) {
        history.rain[id] = history.rain[id] || [];
        history.rain[id].push({ x: now, y: dev.state.rain_level });
        if (history.rain[id].length > MAX_POINTS) history.rain[id].shift();
      }
    }
  } catch (e) {}
}

function updateCharts() {
  let hasData = false;
  for (const [id, data] of Object.entries(history.temp)) { if (data.length) { tempChart.data.datasets[0].data = data; hasData = true; } }
  for (const [id, data] of Object.entries(history.hum)) { if (data.length) { humChart.data.datasets[0].data = data; hasData = true; } }
  for (const [id, data] of Object.entries(history.gas)) { if (data.length) { gasChart.data.datasets[0].data = data; hasData = true; } }
  for (const [id, data] of Object.entries(history.rain)) { if (data.length) { rainChart.data.datasets[0].data = data; hasData = true; } }
  if (hasData) {
    tempChart.update('none'); humChart.update('none'); gasChart.update('none'); rainChart.update('none');
    document.getElementById('charts-section').style.display = 'block';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  initCharts();
  loadHistory().then(updateCharts);
  setInterval(() => { loadHistory().then(updateCharts); }, 10000);
});
</script>
</body>
</html>
