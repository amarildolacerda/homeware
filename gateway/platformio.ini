[env:esp8266_gateway]
platform = espressif8266
board = d1_mini
framework = arduino
monitor_speed = 115200
monitor_filters = esp8266_exception_decoder
lib_extra_dirs = ../shared
build_flags = 
    -D HEARTBEAT_INTERVAL_MS=30000
    -D SENSOR_TIMEOUT_MS=300000
    -D PAIR_BUTTON_GPIO=0
    -D STATUS_LED_GPIO=2
    -D MQTT_HOST_DEFAULT=\"192.168.1.12\"
    -D MQTT_PORT_DEFAULT=1883
    -D MQTT_USER_DEFAULT=\"kzuca\"
    -D MQTT_PASS_DEFAULT=\"123\"
lib_deps = 
    bblanchon/ArduinoJson@^7.2.1
    knolleary/PubSubClient@^2.8
    tzapu/WiFiManager@^2.0.17

board_build.flash_mode = dio
board_build.f_cpu = 80000000L
upload_speed = 115200

[env:esp8266_gateway_ota]
platform = espressif8266
board = d1_mini
framework = arduino
board_build.flash_mode = dio
board_build.f_cpu = 80000000L
upload_protocol = espota

upload_port = 192.168.1.14

upload_speed = 115200
monitor_speed = 115200
monitor_filters = esp8266_exception_decoder
lib_extra_dirs = ../shared
build_flags = 
    -D HEARTBEAT_INTERVAL_MS=30000
    -D SENSOR_TIMEOUT_MS=300000
    -D PAIR_BUTTON_GPIO=0
    -D STATUS_LED_GPIO=2
lib_deps = 
    bblanchon/ArduinoJson@^7.2.1
    knolleary/PubSubClient@^2.8
    tzapu/WiFiManager@^2.0.17

[env:esp32_gateway]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.flash_mode = dio
board_build.partitions = partitions.csv
board_upload.offset_address = 0x20000
lib_extra_dirs = ../shared
build_flags = 
    -D HEARTBEAT_INTERVAL_MS=30000
    -D SENSOR_TIMEOUT_MS=300000
    -D PAIR_BUTTON_GPIO=0
    -D STATUS_LED_GPIO=2
    -D CONFIG_LWIP_MAX_SOCKETS=16
    -D STATIC_WIFI
    -D WIFI_SSID=\"kcasa\"
    -D WIFI_PASS=\"3938373635\"
lib_deps = 
    bblanchon/ArduinoJson@^7.2.1
    knolleary/PubSubClient@^2.8

[env:esp32C3_gateway]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
build_type = release
monitor_speed = 115200
monitor_port = COM5
monitor_filters = esp32_exception_decoder
board_build.flash_mode = dio
