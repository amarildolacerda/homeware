[platformio]
default_envs = esp8266

[env]
build_flags = -Wall -std=gnu++17 -I../../shared
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson @ ^7
    tzapu/WiFiManager @ ^0.16

[env:esp8266]
platform = espressif8266
board = d1_mini
framework = arduino
board_build.f_cpu = 80000000L
board_build.flash_mode = dout
board_build.ldscript = eagle.flash.4m1m.ld
build_flags =
    ${env.build_flags}
    -DSTATIC_WIFI
    -DWIFI_SSID=\"kcasa\"
    -DWIFI_PASS=\"3938373635\"
    -DGATEWAY_MAC=\"B4:E6:2D:EA:4B:41\"

[env:esp8266_ota]
platform = espressif8266
board = d1_mini
framework = arduino
board_build.f_cpu = 80000000L
board_build.flash_mode = dout
board_build.ldscript = eagle.flash.4m1m.ld
build_flags =
    ${env.build_flags}
    ;-DSTATIC_WIFI
    ;-DWIFI_SSID=\"kcasa\"
    ;-DWIFI_PASS=\"3938373635\"
    ;-DGATEWAY_MAC=\"B4:E6:2D:EA:4B:41\"
upload_protocol = espota
upload_port = 192.168.1.15
upload_flags =
    --port=8266
    --auth=

[env:esp8266_esp01s]
platform = espressif8266
board = esp01_1m
framework = arduino
board_build.f_cpu = 80000000L
board_build.flash_mode = dout
board_build.ldscript = eagle.flash.1m.ld
build_flags =
    ${env.build_flags}
    -DESP01S
    -DSTATIC_WIFI
    -DWIFI_SSID=\"kcasa\"
    -DWIFI_PASS=\"3938373635\"
    -DGATEWAY_MAC=\"\"
lib_deps =
    bblanchon/ArduinoJson @ ^7

