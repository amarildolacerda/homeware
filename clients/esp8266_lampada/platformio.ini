[platformio]
default_envs = esp8266

[env]
build_flags = -Wall -std=gnu++17
monitor_speed = 115200
lib_ldf_mode = deep
lib_extra_dirs =
    ../../shared
lib_deps =
    bblanchon/ArduinoJson @ ^7
    tzapu/WiFiManager @ ^0.16
    Aircoookie/Espalexa @ ^2.7.0

[env:esp8266]
platform = espressif8266
board = d1_mini
framework = arduino
lib_extra_dirs = ../../
board_build.f_cpu = 80000000L
board_build.flash_mode = dout
board_build.ldscript = eagle.flash.4m1m.ld
build_flags =
    ${env.build_flags}
    -I../../shared
    -DHABILITA_REPEATER
    -DHABILITA_ALEXA
    -DHABILITA_PINOS

[env:esp8266_test]
platform = espressif8266
board = d1_mini
framework = arduino
lib_extra_dirs = ../../shared
board_build.f_cpu = 80000000L
board_build.flash_mode = dout
board_build.ldscript = eagle.flash.4m1m.ld
build_flags =
    ${env.build_flags}
    -I../../shared
    -DHABILITA_REPEATER
    -DHABILITA_ALEXA
    -DHABILITA_PINOS
    -DSTATIC_WIFI
    -DWIFI_SSID=\"kcasa\"
    -DWIFI_PASS=\"3938373635\"
    -DGATEWAY_MAC=\"\"

lib_deps =
    ${env.lib_deps}

[env:esp8266_ota]
platform = espressif8266
board = d1_mini
framework = arduino
lib_extra_dirs = ../../shared
board_build.f_cpu = 80000000L
board_build.flash_mode = dout
board_build.ldscript = eagle.flash.4m1m.ld
build_flags =
    ${env.build_flags}

    -DHABILITA_REPEATER
    -DHABILITA_ALEXA
    -DHABILITA_PINOS
    -DSTATIC_WIFI
    -DHABILITA_PINOS
    -DWIFI_SSID=\"kcasa\"
    -DWIFI_PASS=\"3938373635\"

lib_deps =
    ${env.lib_deps}
upload_protocol = espota
upload_port = 192.168.1.42
upload_flags =
    --port=8266
    --auth=

[env:esp8266_esp01s]
platform = espressif8266
board = esp01_1m
framework = arduino
lib_extra_dirs = ../../
board_build.f_cpu = 80000000L
board_build.flash_mode = dout
board_build.ldscript = eagle.flash.1m.ld
build_flags =
    ${env.build_flags}
    -I../../shared
    -DESP01S
    -DSTATIC_WIFI
    ;-DHABILITA_PINOS
    ;-DHABILITA_REPEATER
    -DWIFI_SSID=\"kcasa\"
    -DWIFI_PASS=\"3938373635\"
    -DGATEWAY_MAC=\"\"

lib_deps =
    bblanchon/ArduinoJson @ ^7
