[platformio]
src_dir = .

; ============================================================
; Shared
; ============================================================
[env]
framework = arduino
monitor_speed = 115200
monitor_filters = esp8266_exception_decoder
lib_extra_dirs = shared
lib_deps =
    bblanchon/ArduinoJson @ ^7
build_flags = -Wall -std=gnu++17

; ============================================================
; Gateway ESP8266
; ============================================================
[env:esp8266_gateway]
platform = espressif8266
board = d1_mini
build_src_filter = +<gateway/src/**> -<gateway/.pio/**>
board_build.flash_mode = dio
board_build.f_cpu = 80000000L
upload_speed = 115200
lib_extra_dirs = shared
build_flags =
    ${env.build_flags}
    -Igateway/include
    -Igateway/src
    -D HEARTBEAT_INTERVAL_MS=30000
    -D SENSOR_TIMEOUT_MS=300000
    -D PAIR_BUTTON_GPIO=0
    -D STATUS_LED_GPIO=2
    -D MQTT_HOST_DEFAULT=\"192.168.1.12\"
    -D MQTT_PORT_DEFAULT=1883
    -D MQTT_USER_DEFAULT=\"kzuca\"
    -D MQTT_PASS_DEFAULT=\"123\"
lib_deps =
    ${env.lib_deps}
    knolleary/PubSubClient@^2.8
    tzapu/WiFiManager@^2.0.17

[env:esp8266_gateway_ota]
extends = env:esp8266_gateway
upload_protocol = espota
upload_port = 192.168.1.14

; ============================================================
; Gateway ESP32
; ============================================================
[env:esp32_gateway]
platform = espressif32
board = esp32dev
monitor_filters = esp32_exception_decoder
build_src_filter = +<gateway/src/**> -<gateway/.pio/**>
board_build.flash_mode = dio
board_build.partitions = gateway/partitions.csv
board_upload.offset_address = 0x20000
lib_extra_dirs = shared
build_flags =
    ${env.build_flags}
    -Igateway/include
    -Igateway/src
    -D HEARTBEAT_INTERVAL_MS=30000
    -D SENSOR_TIMEOUT_MS=300000
    -D PAIR_BUTTON_GPIO=0
    -D STATUS_LED_GPIO=2
    -D CONFIG_LWIP_MAX_SOCKETS=16
    -D STATIC_WIFI
    -D WIFI_SSID=\"kcasa\"
    -D WIFI_PASS=\"3938373635\"
lib_deps =
    ${env.lib_deps}
    knolleary/PubSubClient@^2.8

[env:esp32_gateway_ota]
extends = env:esp32_gateway
upload_protocol = espota
upload_port = 192.168.1.14

; ============================================================
; Gateway ESP32-C3
; ============================================================
[env:esp32C3_gateway]
platform = espressif32
board = esp32-c3-devkitm-1
monitor_port = COM5
monitor_filters = esp32_exception_decoder
build_src_filter = +<gateway/src/**> -<gateway/.pio/**>
board_build.flash_mode = dio
board_build.flash_size = 4MB
board_build.partitions = gateway/partitions.csv
board_upload.offset_address = 0x20000
upload_port = COM5
lib_extra_dirs = shared
build_flags =
    ${env.build_flags}
    -Igateway/include
    -Igateway/src
    -D HEARTBEAT_INTERVAL_MS=30000
    -D SENSOR_TIMEOUT_MS=300000
    -D PAIR_BUTTON_GPIO=0
    -D STATUS_LED_GPIO=2
    -D CONFIG_LWIP_MAX_SOCKETS=16
    -D STATIC_WIFI
    -D WIFI_SSID=\"kcasa\"
    -D WIFI_PASS=\"3938373635\"
lib_deps =
    ${env.lib_deps}
    knolleary/PubSubClient@^2.8

; ============================================================
; Lampada
; ============================================================
[env:esp8266_lamp]
platform = espressif8266
board = d1_mini
build_src_filter = +<clients/esp8266_lampada/src/**> -<clients/esp8266_lampada/.pio/**>
board_build.f_cpu = 80000000L
board_build.flash_mode = dout
board_build.ldscript = eagle.flash.4m1m.ld
lib_extra_dirs = shared
lib_deps =
    ${env.lib_deps}
    tzapu/WiFiManager @ ^0.16
    Aircoookie/Espalexa @ ^2.7.0
build_flags =
    ${env.build_flags}
    -Iclients/esp8266_lampada/include
    -DHABILITA_REPEATER
    -DHABILITA_ALEXA
    -DHABILITA_PINOS

[env:esp8266_lamp_ota]
extends = env:esp8266_lamp
upload_protocol = espota
upload_port = 192.168.1.41
upload_flags =
    --port=8266
    --auth=

; ============================================================
; OnOff
; ============================================================
[env:esp8266_onoff]
platform = espressif8266
board = d1_mini
build_src_filter = +<clients/esp8266_onoff/src/**> -<clients/esp8266_onoff/.pio/**>
board_build.f_cpu = 80000000L
board_build.flash_mode = dout
board_build.ldscript = eagle.flash.4m1m.ld
lib_extra_dirs = shared
lib_deps =
    ${env.lib_deps}
    tzapu/WiFiManager @ ^0.16
    Aircoookie/Espalexa @ ^2.7.0
build_flags =
    ${env.build_flags}
    -Iclients/esp8266_onoff/include
    -DHABILITA_REPEATER
    -DHABILITA_ALEXA

[env:esp8266_onoff_ota]
extends = env:esp8266_onoff
upload_protocol = espota
upload_port = 192.168.4.1
upload_flags =
    --port=8266
    --auth=

; ============================================================
; PIR
; ============================================================
[env:esp8266_pir]
platform = espressif8266
board = nodemcuv2
build_src_filter = +<clients/esp8266_pir/src/**> -<clients/esp8266_pir/.pio/**>
board_build.filesystem = littlefs
board_build.flash_size = 4MB
board_build.filesystem_size = 1MB
lib_extra_dirs = shared
build_flags =
    ${env.build_flags}
    -Iclients/esp8266_pir/include
    -D ESPNOW_CHANNEL=1
lib_deps =
    ${env.lib_deps}
    tzapu/WiFiManager@^2.0.0

[env:esp8266_pir_ota]
extends = env:esp8266_pir
upload_protocol = espota
upload_port = 192.168.1.53

; ============================================================
; DHT + Gas
; ============================================================
[env:esp8266_dht]
platform = espressif8266
board = d1_mini
build_src_filter = +<clients/esp8266_dht_gas/src/**> -<clients/esp8266_dht_gas/.pio/**>
lib_extra_dirs = shared
build_flags =
    ${env.build_flags}
    -Iclients/esp8266_dht_gas/include
    -D ESPNOW_CHANNEL=1
lib_deps =
    ${env.lib_deps}
    tzapu/WiFiManager@^2.0.0
    adafruit/DHT sensor library@^1.4.6

[env:esp8266_dht_ota]
extends = env:esp8266_dht
upload_protocol = espota
upload_port = 192.168.1.101
